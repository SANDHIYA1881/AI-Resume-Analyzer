<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Common Head Fragment -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">AI Resume Analyzer</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts (Outfit & Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- Common Navbar Fragment -->
<nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top py-3">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <i class="bi bi-cpu-fill me-2 fs-4"></i>
            <span>AI RESUME MATCH</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'home'} ? 'active' : ''" href="/">
                        <i class="bi bi-house-door-fill me-1"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''" href="/dashboard-view">
                        <i class="bi bi-speedometer2 me-1"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'upload'} ? 'active' : ''" href="/upload">
                        <i class="bi bi-file-earmark-arrow-up-fill me-1"></i> Resumes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'jobs'} ? 'active' : ''" href="/jobs">
                        <i class="bi bi-briefcase-fill me-1"></i> Jobs
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'analysis'} ? 'active' : ''" href="/analysis">
                        <i class="bi bi-award-fill me-1"></i> Matching
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Common Footer Fragment -->
<footer th:fragment="footer" class="py-4 mt-5 border-top border-secondary border-opacity-10 bg-dark bg-opacity-50">
    <div class="container text-center">
        <p class="mb-1 text-secondary">&copy; 2026 AI-Powered Resume Analyzer and Job Matching System.</p>
        <p class="small text-muted mb-0">Designed for Final Year Mini Project. Enabled with Java 17, Spring Boot, and Apache PDFBox.</p>
    </div>
    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
